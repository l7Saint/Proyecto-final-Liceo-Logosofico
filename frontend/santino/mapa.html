<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>

		<!-- bootstrap cdn -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
		<!-- cdn de google para la fuente de Open Sans -->
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">

		<!-- Leaflet.js cdn -->
		<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
		<script	src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
	</head>
	<style>
/*Esto es para crear variables de css,
  basicamente, desde aca puedo cambiar el padding
	  general de los elementos adentro del navbar, o los
  colores*/
:root { 
	/*colores*/
	--color-fondo: #88B6C2;
	--color-navbar: #32545C;
	--color-boton-navbar: #1B3237;
	--color-titulos: #32545c;
	--color-subtitulos: #497C88;
	--color-texto: #21434D;

	--padding-navbar: 1rem;

	/*69% de la altura de la pantalla del usuario*/
	--altura-mapa: 65vh;
	--ancho-mapa: 100%;
}

body{
	background-color:var(--color-fondo);
	padding-bottom: 20px;
	font-size: 19px;
	font-family: 'Open Sans', sans-serif;
}

#barraNavbar {
	width: 100%;
	background-color: var(--color-navbar);
	position: fixed;
	bottom: 0;
	left: 0;
	z-index: 1050;
}

#marcaNavbar{
	color: white;
	font-size: 30px;
	font-family:Verdana, Geneva, Tahoma, sans-serif;
	font-weight: bold;
	/*aca uso la variable, si despues le pongo "--padding-navbar: 3rem;"
	  se va a ver afectado en todos los "var(--padding-navbar);"*/
	margin-left: var(--padding-navbar);
	margin-right: var(--padding-navbar);
}

#botonesNavbar{
	margin-left: var(--padding-navbar);
	margin-right: var(--padding-navbar);
	gap: 0.4rem;
}

/*aca sobreescribo 2 atributos de una de las clases de bootstrap*/
.btn {
	background-color: var(--color-boton-navbar); 
	color: white;
}

#botonHamburguesa {
	margin-left: var(--padding-navbar);
	margin-right: var(--padding-navbar);
}

.titulos{
	/*font-family:Verdana, Geneva, Tahoma, sans-serif;*/
	font-weight: bold;
	color: var(--color-titulos);
}

.subTitulos{
	/*font-family:Verdana, Geneva, Tahoma, sans-serif;*/
	color : var(--color-subtitulos);
}

.texto{
	/*font-family:Verdana, Geneva, Tahoma, sans-serif;*/
	color: var(--color-texto);
}

#contenido {
	text-align: center;
	margin-top: 0.5rem;	
}

	@media (min-width: 992px) { 
		#contenido {
			text-align: left;
		} 

		/*aca cambio el padding del navbar
		  para las pantallas grandes ( > o = 992px ) */
		:root { 
			--padding-navbar: 2.4rem;
			--altura-mapa: 69vh;
		}
	} 

	#map {
		height: var(--altura-mapa);
		width: var(--ancho-mapa);
		border-style: solid;
		border-width: 5px;
		border-color: var(--color-boton-navbar);
	}
	</style>
	<!--
		Leaflet.js es una libreria de javascript que nos permite utilizar los datos
		de OpenStreetMaps para hacer un mapa interactivo en la pagina.
	-->
	<body>
		<div id="contenedorPrincipal" class="d-flex container-fluid align-items-center">
			<div id="contenido" class="container-lg">
				<!-- <h1 class="titulos">Mapa</h1>
				<h3 class="subTitulos">SubTitulo</h3> -->
				<p class="texto">Texto</p>
				<div id="map"></div>
			</div>
		</div>
		<script>
			// Create the map
			const mapa = L.map('map').setView([-34.9011, -56.1645], 13);

			// OpenStreetMap tiles
			L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
				attribution: '&copy; OpenStreetMap contributors'
			}).addTo(mapa);

			// Marker
			L.marker([-34.9011, -56.1645])
				.addTo(mapa)
				.bindPopup('Montevideo')
				.openPopup()

			if (navigator.geolocation) {
				navigator.geolocation.getCurrentPosition(
					function(position) {
						const lat = position.coords.latitude;
						const lng = position.coords.longitude;

						map.setView([lat, lng], 15);

						L.marker([lat, lng])
							.addTo(map)
							.bindPopup('You are here')
							.openPopup();
					},
					function(error) {
						console.error('Geolocation error:', error);
						alert('Could not get your location.');
					}
				);
			} else {
				alert('Geolocation is not supported by your browser.');
			}
		</script>

		<!--Aca esta la barrita, el navbar-->
		<div id="barraNavbar" class="justify-content-between navbar navbar-expand-lg">
			<div class="d-flex ">
				<a id="marcaNavbar" class="navbar-brand" href="#">Urbanaut</a>
			</div>
			<!--
				<div id="botonesNavbar" class="d-flex">
				<button class="botonNavbar" onclick="botonInicio()">Inicio</button>
				<button class="botonNavbar" onclick="botonMapa()">Mapa</button>
				<button class="botonNavbar" onclick="botonOpciones()">Opciones</button>
				<button class="botonNavbar" onclick="botonCuenta()">Cuenta</button>

				</div>
			-->
			<button id="botonHamburguesa" class="navbar-toggler my-auto" type="button" data-bs-toggle="collapse" data-bs-target="#botonesNavbar">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div id="botonesNavbar" class="collapse navbar-collapse justify-content-end text-end">
				<!-- Links de la navbar -->
				<ul class="navbar-nav">	
					<li class="nav-item item-navbar">
						<a class="nav-link link-navbar" href="#">
							<button class="btn rounded">Inicio</button>
						</a>
					</li>
					<li class="nav-item item-navbar">
						<a class="nav-link link-navbar" href="#">
							<button class="btn rounded">Mapa</button>
						</a>
					</li>
					<li class="nav-item item-navbar">
						<a class="nav-link link-navbar" href="#">
							<button class="btn rounded">Opciones</button>
						</a>
					</li>
					<li class="nav-item item-navbar">
						<a class="nav-link link-navbar" href="#">
							<button class="btn rounded">Cuenta</button>
						</a>
					</li>
				</ul>
			</div>
		</div>
	</body>
</html>
