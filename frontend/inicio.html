<!DOCTYPE html>
<!--
	Lista de TODOS:
		O> Hacer login como pantalla emergente.
-->
<html>
	<head> 
		<title>Urbanaut</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="./style.css">
		<!-- bootstrap cdn -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<!-- cdn de google para la fuente de Open Sans -->
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
	</head> 
	<body class="min-vh-100 d-flex"> 
		<!--contenedor de toda la pagina, todo lo que se ve-->
		<!--el flexcolumn lo alinea verticalmente -->
		<div id="page" class="container-fluid d-flex flex-column">
			<!--navbar-->
			<div id="navbar" style="" class="opensansfont navbar-padding navbar navbar-light bg-light navbar-expand-lg" hidden>
				<div class="container-fluid">
					<button id="hamburguer-button" class="navbar-toggler my-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-content">
						<span class="navbar-toggler-icon"></span>
					</button>	
					<div class="brand-div">
						<a id="brand" class="navbar-brand" href="#">Urbanaut</a>
					</div>
					<div class="collapse navbar-collapse justify-content-end text-end" id="navbar-content">
						<!-- Links de la navbar -->
						<ul class="navbar-nav">	
							<li class="nav-item item-navbar">
								<a class="nav-link link-navbar" href="#">
									<button class="button-navbar btn btn-light rounded">Inicio</button>
								</a>
							</li>
							<li class="nav-item item-navbar">
								<a class="nav-link link-navbar" href="#">
									<button class="button-navbar btn btn-light rounded">Mi Cuenta</button>
								</a>
							</li>
							<li class="nav-item item-navbar">
								<a class="nav-link link-navbar" href="#">
									<button class="button-navbar btn btn-light rounded">Nosotros</button>
								</a>
							</li>
							<li class="nav-item item-navbar">
								<a class="nav-link link-navbar" href="#">
									<button class="button-navbar btn btn-light rounded">Login</button>
								</a>
							</li>
						</ul>
					</div>
				</div>
			</div>
			<!--row principal, el que dicta la estructura de la pagina-->
			<div id="main-row" class="row flex-grow-1">
				<!--barra lateral izquierda-->
				<!--la columna ocupa toda la pantalla cuando se mira desde celular-->
				<div id="sidebar" class="opensansfont sidebar d-flex align-items-start col-12 col-lg-3 min-vh-100">
					<div id="sidebar-contents" class="sidebar-contents d-flex flex-column align-items-center mx-auto text-center">
						<!-- contenido de la barra lateral izquierda -->
						<label id="sidebar-brand">Urbanaut</label>
						<div id="sidebar-form">
							<button onclick="ingresar()" class="btn btn-light">Ingresar</a> 
						</div>
						<div id="sidebar-extra">
						</div>
					</div>
				</div>
				<div id="content" class="content">
					<!-- aca esta el contenido real de la pagina, no el sidebar o el navbar que
						son como "menus" -->
				</div>
			</div>
		</div>
		<!-- cdn js bootstrap -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
		<!-- js -->
		<script src="./main.js"></script>
	</body> 
</html>
