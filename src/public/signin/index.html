		<!-- SELECCIÓN DE HORARIOS-->
		<script>
			var horariosCreados = false;
			const DIAS = [
				"Lunes",	
				"Martes",	
				"Miercoles",	
				"Jueves",	
				"Viernes",	
			]
			const HORAS = [
				"8:00 - 8:40",  // 0
				"8:40 - 9:20",  // 1
				"9:25 - 10:05", // 2
				"10:15 - 10:55",// 3
				"11:00 - 11:40",// 4
				"11:00 - 11:40",// 5
				"11:45 - 12:25",// 6
				"12:25 - 13:05",// 7
				"13:05 - 13:45",// 8
				"13:50 - 14:30",// 9
				"14:30 - 15:10",// 10
				"15:15 - 15:55",// 11
				"15:55 - 16:35" // 12
			];

			function generarLiHorarioHora(dia, nhora){
				var liHora = document.createElement("li");
				// 'dia' tendria que ser por ejemplo: "Viernes"
				// 'nhora' tendria que ser el numero de la hora, por ejemplo: "5"
				// que corresponderia a "11:00 - 11:40"
				liHora.innerHTML = `
				<label for="`+dia+nhora+`" class="dias">`+HORAS[nhora]+`</label>
				<input
					type="checkbox"
					id="`+dia+nhora+`"
					name="horarios`+dia+`[]"
					value="`+nhora+`"
				/>
				`;
				liHora.id = "li"+dia+nhora;
				return liHora;
			}

			function generarUlHorarioDia(dia){
				// 'dia' tendria que ser por ejemplo: "Viernes"
				var ulDia = document.createElement("ul");
				for(nhora = 0; nhora < HORAS.length; nhora++){
					var liHora = generarLiHorarioHora(dia, nhora);
					liHora.classList.add("li-hora");
					liHora.classList.add("d-flex");
					liHora.classList.add("justify-content-end");
					ulDia.appendChild(liHora);
				}
				ulDia.id = "ul"+dia;
				return ulDia;
			}

			function generarHorarios() {
				for(ndia = 0; ndia < DIAS.length; ndia++){
					var contenedorDia = document.getElementById("contenedor"+DIAS[ndia]);
					var ulDia = generarUlHorarioDia(DIAS[ndia]);
					ulDia.hidden = true;
					contenedorDia.appendChild(ulDia);
				}
			}

			function despliegaHorarios(idUl){
				if(!horariosCreados){
					generarHorarios();
					horariosCreados = true;
				}

				var ul = document.getElementById(idUl);
				if(ul.hidden){
					ul.hidden = false;
				} else {
					ul.hidden = true;
				}
			}
		</script>
