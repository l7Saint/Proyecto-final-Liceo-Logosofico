    <script>
      function DespliegaHorarios() {
        var tarjeta = document.getElementById("cajaCrearCuenta");

        /*LUNES*/
        ulLun = document.getElementById("ul-lunes");
        var asisteLunes = document.getElementById("lunes");
        if (asisteLunes.checked) {
          ulLun.hidden = false;
        } else {
          ulLun.hidden = true;
        }

        /*MARTES*/
        ulMar = document.getElementById("ul-martes");
        var asisteMartes = document.getElementById("martes");
        if (asisteMartes.checked) {
          ulMar.hidden = false;
        } else {
          ulMar.hidden = true;
        }

        /*MIERCOLES*/
        ulMie = document.getElementById("ul-miercoles");

          ulMie.hidden = false;
        } else {
          ulMie.hidden = true;
        }

        /*JUEVES*/
        ulJue = document.getElementById("ul-jueves");
        var asisteJueves = document.getElementById("jueves");
        if (asisteJueves.checked) {
          ulJue.hidden = false;
        } else {

        }

        ulVie = document.getElementById("ul-viernes");
