<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
		<!-- bootstrap cdn -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
		<!-- cdn de google para la fuente de Open Sans -->
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

	<script src="../../assets/js/cargarNavbar.js"></script>
</head>
	<style>
/*Esto es para crear variables de css,
  basicamente, desde aca puedo cambiar el padding
  general de los elementos adentro del navbar, o los
  colores*/
:root { 
	/*colores*/
	--color-fondo: #88B6C2;
	--color-navbar: #32545C;
	--color-boton-navbar: #1B3237;
	--color-titulos: #32545c;
	--color-subtitulos: #497C88;
	--color-texto: #21434D;

	--padding-navbar: 1rem;
}

body{
	background-color:var(--color-fondo);
	padding-bottom: 20px;
	font-size: 19px;
	font-family: 'Open Sans', sans-serif;
}

#barraNavbar {
	width: 100%;
	background-color: var(--color-navbar);
	position: fixed;
	bottom: 0;
	left: 0;
	/*fuerza a que la navbar se superponga sobre todos los elementos*/
	z-index: 1050;
}

#marcaNavbar{
	color: white;
	font-size: 30px;
	font-family:Verdana, Geneva, Tahoma, sans-serif;
	font-weight: bold;
	/*aca uso la variable, si despues le pongo "--padding-navbar: 3rem;"
	  se va a ver afectado en todos los "var(--padding-navbar);"*/
	margin-left: var(--padding-navbar);
	margin-right: var(--padding-navbar);
}

#botonesNavbar{
	margin-left: var(--padding-navbar);
	margin-right: var(--padding-navbar);
	gap: 0.4rem;
}

/*aca sobreescribo 2 atributos de una de las clases de bootstrap*/
.btn {
	background-color: var(--color-boton-navbar); 
	color: white;
}

#botonHamburguesa {
	margin-left: var(--padding-navbar);
	margin-right: var(--padding-navbar);
}

.titulos{
	/*font-family:Verdana, Geneva, Tahoma, sans-serif;*/
	font-weight: bold;
	color: var(--color-titulos);
}

.subTitulos{
	/*font-family:Verdana, Geneva, Tahoma, sans-serif;*/
	color : var(--color-subtitulos);
}

.texto{
	/*font-family:Verdana, Geneva, Tahoma, sans-serif;*/
	color: var(--color-texto);
}

#contenido {
	text-align: center;
	margin-top: 0.5rem;	
}

@media (min-width: 992px) { 
	#contenido {
		text-align: left;
	} 

	/*aca cambio el padding del navbar
	  para las pantallas grandes ( > o = 992px ) */
	:root { 
		--padding-navbar: 2.4rem;
	}
} 

	#cajaEstPrivado{
		background-color: whitesmoke;
		 border-radius: 15px;
		 width: fit-content;
		 margin: 0 auto;
   		 margin-top: 1rem
	}

	.imgMantenimiento{
	 	width: 50rem;
    	display: block;
   		margin: 0 auto -3rem auto;
	
	}

	.textoMant{
		margin-top: 0;
   		text-align: center;
		font-weight: bold;
		font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		font-size: 2.2rem;
		letter-spacing: 0.05rem;
		color: #477D8A;
		text-shadow: 0.1rem 0.1rem 0.2rem #88B6C2;
	}

	.subMant{
		text-align: center;
		color:#090F11;
	}

	.btnVolver{
	padding: 0.5rem;
	width: 6rem;
	background-color: #28464D;
    color: white;
	font-family: Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 0.8rem;
    border: 0.15rem solid #182B2F;
    transition: 0.3s;
	margin-bottom: 1rem;
	}

	.btnVolver:hover{
    background-color: white;
    color: #28464D;
    transform: translateY(-0.2rem);
    box-shadow: 0 0.5rem 1rem;
}

	</style>
	<body>
		<div id="contenedorPrincipal" class="  d-flex container-fluid align-items-center">
			<div id="contenido" class="container-lg">
				<div id="cajaEstPrivado">
				<center>
				<img class="imgMantenimiento" src="../../../assets/img/mantenimiento.png">
				</center>
				<h1 class="textoMant">ESTAMOS HACIENDO ALGUNOS AJUSTES</h1>
				<p class="subMant">El servicio estará disponible en breve, gracias por tu paciencia</p>
				<a class="text-decoration-none" href="../index.html">
					<center>
						<button class="btnVolver">Volver</button>
						</center>
					<a/>
					</div>
			</div>
		</div>

		<!--Aca esta la barrita, el navbar-->
	<div id="barraNavbar" class="justify-content-between navbar navbar-expand-lg">
	</div>
	</body>
</html>
